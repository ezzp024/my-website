<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Status — Cosmo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .brand-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: var(--trans);
      position: relative;
      overflow: hidden;
    }
    .brand-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
    }
    .brand-card.updating::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .brand-card.testing::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .brand-card.online::before { background: linear-gradient(90deg, #10b981, #34d399); }
    .brand-card.offline::before { background: linear-gradient(90deg, #ef4444, #f87171); }
    .brand-card.maintenance::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
    .brand-card.error::before { background: linear-gradient(90deg, #64748b, #94a3b8); }
    .brand-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .brand-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .brand-status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .brand-status-badge.updating { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .brand-status-badge.testing { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .brand-status-badge.online { background: rgba(16,185,129,0.15); color: #34d399; }
    .brand-status-badge.offline { background: rgba(239,68,68,0.15); color: #f87171; }
    .brand-status-badge.maintenance { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .brand-status-badge.error { background: rgba(100,116,139,0.15); color: #94a3b8; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }
    .product-count {
      font-size: 13px;
      color: var(--text3);
      margin-top: 8px;
    }
    .products-drawer {
      position: fixed;
      top: 0; right: -500px;
      width: 450px; height: 100vh;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      z-index: 200;
      transition: right 0.3s ease;
      overflow-y: auto;
      padding: 24px;
    }
    .products-drawer.open { right: 0; }
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 199;
      opacity: 0;
      visibility: hidden;
      transition: var(--trans);
    }
    .drawer-overlay.show { opacity: 1; visibility: visible; }
    .drawer-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: none;
      color: var(--text3);
      font-size: 24px;
      cursor: pointer;
    }
    .drawer-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-right: 40px;
    }
    .product-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .product-item-name { font-size: 14px; font-weight: 500; }
    .product-item-status {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
    }
    .product-item-status.updating { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .product-item-status.testing { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .product-item-status.online { background: rgba(16,185,129,0.15); color: #34d399; }
    .product-item-status.offline { background: rgba(239,68,68,0.15); color: #f87171; }
    .product-item-status.maintenance { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .summary-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--card2);
      border-radius: var(--radius2);
      border: 1px solid var(--border);
    }
    .summary-count { font-size: 20px; font-weight: 700; }
    .summary-label { font-size: 12px; color: var(--text3); }
  </style>
</head>
<body>
<div class="bg-anim"></div>
<div class="grid-bg"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div style="display:flex; min-height:100vh; position:relative; z-index:1;">
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">⚡ Cosmo Support</div>
      <div class="logo-sub">Internal Staff Portal</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section-label">Navigation</div>
      <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span> Home</a>
      <a class="nav-item" href="guide.html"><span class="nav-icon">📖</span> Support Guide</a>
      <a class="nav-item active" href="status.html"><span class="nav-icon">📡</span> Live Status</a>
      <a class="nav-item" href="commands.html"><span class="nav-icon">⚡</span> Bot Commands</a>
      <div class="nav-section-label" style="margin-top:24px;">Quick Links</div>
      <a class="nav-item" href="https://support.cosmotickets.com/" target="_blank"><span class="nav-icon">🌐</span> Support Site</a>
    </div>
    <div class="sidebar-footer">
      <a href="https://support.cosmotickets.com/" target="_blank"><span>🔗</span> support.cosmotickets.com</a>
    </div>
  </nav>

  <main class="main">
    <div class="topbar">
      <div class="page-title">📡 Live Status</div>
      <div class="topbar-actions">
        <div class="refresh-info">
          <div class="refresh-dot"></div>
          <span>Auto-refresh in <span id="countdownDisplay" style="color:var(--purple2);font-weight:600;">30s</span></span>
        </div>
        <button class="btn btn-ghost" onclick="fetchStatus()" style="padding:6px 14px;font-size:12px;">⟳ Refresh Now</button>
      </div>
    </div>

    <div class="status-page-wrap">
      <div class="source-info">
        <div>
          <div style="font-weight:600;margin-bottom:4px;">Live data source</div>
          <div class="source-url">https://support.cosmotickets.com/status/</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:12px;color:var(--text3);">Last updated</div>
          <div id="lastUpdated" style="font-size:13px;font-weight:600;color:var(--text2);">—</div>
        </div>
      </div>

      <div class="summary-bar" id="summaryBar"></div>

      <div class="status-grid" id="statusGrid">
        <div class="status-loading">
          <div class="countdown-ring"></div>
          <span>Loading live status...</span>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="products-drawer" id="productsDrawer">
  <button class="drawer-close" onclick="closeDrawer()">×</button>
  <div class="drawer-title" id="drawerTitle">Brand Products</div>
  <div id="productsList"></div>
</div>

<script>
const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', e => { glow.style.left=e.clientX+'px'; glow.style.top=e.clientY+'px'; });
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

let countdown = 30;
let countdownTimer;
let allBrands = [];

function getStatusClass(status) {
  const s = status.toLowerCase();
  if (s.includes('updat')) return 'updating';
  if (s.includes('test')) return 'testing';
  if (s.includes('offline') || s.includes('down')) return 'offline';
  if (s.includes('maintenance')) return 'maintenance';
  if (s.includes('online') || s.includes('operational')) return 'online';
  return 'error';
}

function getStatusLabel(status) {
  const s = status.toLowerCase();
  if (s.includes('updat')) return 'Updating';
  if (s.includes('test')) return 'Testing';
  if (s.includes('offline') || s.includes('down')) return 'Offline';
  if (s.includes('maintenance')) return 'Maintenance';
  if (s.includes('online') || s.includes('operational')) return 'Online';
  if (s.includes('error')) return 'Error';
  return 'Unknown';
}

async function fetchStatus() {
  document.getElementById('statusGrid').innerHTML = `
    <div class="status-loading">
      <div class="countdown-ring"></div>
      <span>Fetching live status...</span>
    </div>`;

  try {
    const resp = await fetch('/api/status', { signal: AbortSignal.timeout(15000) });
    const data = await resp.json();

    if (data.success) {
      allBrands = data.brands || [];
      renderBrands();
      renderSummary();
    } else {
      showError(data.error || 'Failed to fetch status');
    }
  } catch(e) {
    showError(e.message);
  }

  document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
  resetCountdown();
}

function renderSummary() {
  const counts = { updating: 0, testing: 0, online: 0, offline: 0, maintenance: 0 };
  allBrands.forEach(b => {
    const s = b.status.toLowerCase();
    if (s.includes('updat')) counts.updating++;
    else if (s.includes('test')) counts.testing++;
    else if (s.includes('offline') || s.includes('down')) counts.offline++;
    else if (s.includes('maintenance')) counts.maintenance++;
    else if (s.includes('online') || s.includes('operational')) counts.online++;
  });

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item" style="border-color: rgba(245,158,11,0.3);">
      <span class="summary-count" style="color:#fbbf24;">${counts.updating}</span>
      <span class="summary-label">Updating</span>
    </div>
    <div class="summary-item" style="border-color: rgba(59,130,246,0.3);">
      <span class="summary-count" style="color:#60a5fa;">${counts.testing}</span>
      <span class="summary-label">Testing</span>
    </div>
    <div class="summary-item" style="border-color: rgba(16,185,129,0.3);">
      <span class="summary-count" style="color:#34d399;">${counts.online}</span>
      <span class="summary-label">Online</span>
    </div>
    <div class="summary-item" style="border-color: rgba(239,68,68,0.3);">
      <span class="summary-count" style="color:#f87171;">${counts.offline}</span>
      <span class="summary-label">Offline</span>
    </div>
  `;
}

function renderBrands() {
  const grid = document.getElementById('statusGrid');
  grid.innerHTML = '';

  allBrands.forEach((brand, i) => {
    const statusClass = getStatusClass(brand.status);
    const statusLabel = getStatusLabel(brand.status);
    const productCount = brand.products ? brand.products.length : 0;

    const card = document.createElement('div');
    card.className = `brand-card ${statusClass} fade-in`;
    card.style.animationDelay = `${i * 0.05}s`;
    card.onclick = () => openDrawer(brand);
    card.innerHTML = `
      <div class="brand-header">
        <span class="brand-name">${brand.brand}</span>
        <div class="brand-status-badge ${statusClass}">
          <div class="status-dot"></div>
          ${statusLabel}
        </div>
      </div>
      <div class="product-count">${productCount} product${productCount !== 1 ? 's' : ''}</div>
    `;
    grid.appendChild(card);
  });
}

function openDrawer(brand) {
  document.getElementById('drawerTitle').textContent = brand.brand + ' Products';
  const list = document.getElementById('productsList');
  list.innerHTML = '';

  if (brand.products && brand.products.length > 0) {
    brand.products.forEach(p => {
      const statusClass = getStatusClass(p.status);
      const statusLabel = getStatusLabel(p.status);
      const item = document.createElement('div');
      item.className = 'product-item';
      item.innerHTML = `
        <span class="product-item-name">${p.name}</span>
        <span class="product-item-status ${statusClass}">${statusLabel}</span>
      `;
      list.appendChild(item);
    });
  } else {
    list.innerHTML = '<div style="color:var(--text3);text-align:center;padding:40px;">No products found</div>';
  }

  document.getElementById('drawerOverlay').classList.add('show');
  document.getElementById('productsDrawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('show');
  document.getElementById('productsDrawer').classList.remove('open');
}

function showError(msg) {
  document.getElementById('statusGrid').innerHTML = `
    <div class="status-empty" style="grid-column:1/-1;">
      <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
      <div style="font-size:18px;font-weight:700;">Failed to load status</div>
      <div style="font-size:13px;margin-top:8px;color:var(--text3);">${msg}</div>
    </div>`;
}

function resetCountdown() {
  countdown = 30;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdown--;
    document.getElementById('countdownDisplay').textContent = countdown + 's';
    if (countdown <= 0) {
      clearInterval(countdownTimer);
      fetchStatus();
    }
  }, 1000);
}

fetchStatus();
</script>
</body>
</html>
