<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmo Support - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .devtools-popup {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff453a;
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      z-index: 999999;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: rgba(28,28,30,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
    }
    .login-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; color: #f5f5f7; }
    .login-sub { color: #a1a1a6; font-size: 14px; margin-bottom: 28px; }
    .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
    .field label { font-size: 12px; font-weight: 500; color: #6e6e73; letter-spacing: 0.2px; }
    .field input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: #f5f5f7;
      background: rgba(255,255,255,0.06);
      outline: none;
      font-size: 15px;
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    .field input:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,0.2); background: rgba(0,113,227,0.06); }
    .login-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 13px 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      background: #0071e3;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      margin-top: 10px;
      letter-spacing: -0.1px;
    }
    .login-btn:hover { background: #0077ed; }
    .login-btn:active { background: #006edb; transform: scale(0.99); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .login-error { min-height: 20px; margin-top: 12px; color: #ff6961; font-size: 13px; }
    .login-note { margin-top: 20px; color: #6e6e73; font-size: 12px; line-height: 1.65; }
    .login-note code { color: #a1a1a6; font-family: 'SF Mono', monospace; }
  </style>
</head>
<body>
<div class="bg-anim"></div>
<div class="cursor-glow" id="cursorGlow"></div>

<div class="login-wrap">
  <form class="login-card" id="loginForm">
    <div class="login-title">Cosmo Support</div>
    <div class="login-sub">Sign in with your staff account.</div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>

    <button class="login-btn" id="loginBtn" type="submit">Log In</button>
    <div class="login-error" id="loginError"></div>

    <div class="login-note">
      Registration is disabled here. User creation and role management are available only in Owner/msd Admin Panel.
    </div>
  </form>
</div>

<script src="js/cosmic-bg.js"></script>
<script src="js/runtime-config.js"></script>
<script>
const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', (e) => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });

async function checkAlreadyLoggedIn() {
  try {
    const r = await cosmoFetch('/api/auth/me');
    const d = await r.json();
    if (d && d.authenticated) window.location.href = 'dashboard.html';
  } catch (_) {}
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';
  btn.disabled = true;

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const resp = await cosmoFetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (!resp.ok || !data.success) {
      errorEl.textContent = data.error || 'Login failed';
      btn.disabled = false;
      return;
    }
    window.location.href = 'dashboard.html';
  } catch (_) {
    errorEl.textContent = 'Network error. Try again.';
    btn.disabled = false;
  }
});

checkAlreadyLoggedIn();
</script>
</body>
</html>
